version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: xeno-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xeno_crm
    ports:
      - '5532:5432'
    volumes:
      - pgdata_fresh:/var/lib/postgresql/data

volumes:
  pgdata_fresh:
